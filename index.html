<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moms World | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .moms-pink { color: #e91e63; }
        .bg-moms-pink { background-color: #e91e63; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40 text-slate-800 font-sans">

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="moms logo.png" onerror="this.src='https://ui-avatars.com/api/?name=Moms+World&background=e91e63&color=fff'" class="h-10 w-10 rounded-full object-cover border">
                <div>
                    <h1 class="font-black text-sm uppercase text-slate-900 leading-none">Moms World</h1>
                    <p class="text-[8px] font-bold moms-pink uppercase tracking-widest mt-1">Admin Dashboard</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <section id="admin-login" class="hidden animate-pop">
            <div class="bg-white p-8 rounded-[3rem] border shadow-xl text-center space-y-6">
                <div class="w-16 h-16 bg-pink-50 rounded-full flex items-center justify-center mx-auto">
                    <i class="fa-solid fa-lock moms-pink text-2xl"></i>
                </div>
                <h2 class="text-xl font-black">Verify Identity</h2>
                <input type="password" id="admin-pin" maxlength="4" placeholder="••••" class="w-32 text-center text-2xl font-black tracking-[1rem] p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                <button onclick="checkPin()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-xs">Login</button>
            </div>
        </section>

        <div id="tab-container" class="flex bg-slate-200 p-1 rounded-2xl">
            <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm text-slate-900">Manage Stock</button>
            <button onclick="switchTab('store')" id="tab-store" class="flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500">View Store</button>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            
            <div id="edit-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-[100] p-6">
                <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-4 animate-pop shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-2">Edit Item Details</h3>
                    <input type="hidden" id="edit-id">
                    <div class="space-y-3">
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Product Name</label>
                        <input type="text" id="edit-name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                        
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Price (₹)</label>
                        <input type="number" id="edit-price" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                        
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Category</label>
                        <input type="text" id="edit-category" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                        
                        <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Available Sizes (Comma separated)</label>
                        <input type="text" id="edit-sizes" placeholder="S, M, L, XL" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                    </div>
                    <div class="flex gap-2 pt-4">
                        <button onclick="closeEdit()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-[10px]">Cancel</button>
                        <button onclick="saveEdit()" id="btn-save-edit" class="flex-1 bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-[10px]">Update Item</button>
                    </div>
                </div>
            </div>

            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="admin-search" oninput="renderUI()" placeholder="Search your stock..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none text-xs">
            </div>

            <div id="admin-inventory" class="space-y-3 bg-white p-4 rounded-3xl border shadow-sm"></div>
            
            <section class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                <h3 class="text-[10px] font-black uppercase text-slate-400 flex items-center gap-2"><i class="fa-solid fa-plus moms-pink"></i> Add New Product</h3>
                <div class="space-y-3">
                    <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="p-price" placeholder="Price (₹)" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input type="text" id="p-category" placeholder="Category" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
                    </div>
                    <input type="text" id="p-sizes" placeholder="Sizes (e.g. S, M, L)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    
                    <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                        <i class="fa-solid fa-camera text-xl text-slate-300 mb-1"></i>
                        <span class="text-[9px] font-bold uppercase text-slate-400">Add Product Photo</span>
                        <input type="file" id="p-img" accept="image/*" class="hidden" onchange="handleFile(event)">
                    </label>
                    <div id="preview-box" class="hidden relative h-32 rounded-2xl overflow-hidden border">
                        <img id="img-prev" class="w-full h-full object-cover">
                    </div>

                    <button onclick="uploadProduct()" id="btn-pub" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-xs active:scale-95 transition-all">Publish to Store</button>
                </div>
            </section>
        </div>

        <div id="view-store" class="hidden space-y-6 animate-pop">
            <div id="store-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t p-4 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center text-slate-400">
            <button onclick="switchTab('admin')" id="nav-admin" class="flex flex-col items-center gap-1"><i class="fa-solid fa-sliders text-xl"></i><span class="text-[9px] font-bold uppercase">Admin</span></button>
            <button onclick="copyLink()" class="flex flex-col items-center gap-1"><i class="fa-solid fa-share-nodes text-xl"></i><span class="text-[9px] font-bold uppercase">Share Store</span></button>
        </div>
    </nav>

    <script>
        const SUPABASE_URL = 'https://kqgeojqdmyuejteqtczu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HaDa8rT3A4_l2E9DhzpGwQ_wJYDBNzO'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const MASTER_PIN = '1234'; 
        let isAdminAuthenticated = false;
        let products = [];
        let selectedFile = null;

        window.onload = () => {
            fetchProducts();
            if (new URLSearchParams(window.location.search).get('view') === 'store') {
                document.getElementById('tab-container').style.display = 'none';
                document.getElementById('nav-admin').style.display = 'none';
                switchTab('store');
            } else { switchTab('admin'); }
        };

        async function fetchProducts() {
            const { data, error } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
            if (!error) { products = data; renderUI(); }
        }

        function checkPin() {
            if (document.getElementById('admin-pin').value === MASTER_PIN) {
                isAdminAuthenticated = true;
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
            } else { alert("Wrong PIN!"); document.getElementById('admin-pin').value = ''; }
        }

        // FULL CONTROL EDITING
        function openEdit(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-name').value = p.name;
            document.getElementById('edit-price').value = p.price;
            document.getElementById('edit-category').value = p.category || '';
            document.getElementById('edit-sizes').value = p.sizes || '';
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-modal').classList.add('flex');
        }

        function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); document.getElementById('edit-modal').classList.remove('flex'); }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const updates = {
                name: document.getElementById('edit-name').value,
                price: parseFloat(document.getElementById('edit-price').value),
                category: document.getElementById('edit-category').value,
                sizes: document.getElementById('edit-sizes').value
            };
            
            const btn = document.getElementById('btn-save-edit');
            btn.innerText = "UPDATING..."; btn.disabled = true;

            const { error } = await supabaseClient.from('products').update(updates).eq('id', id);
            if (error) alert("Edit Failed: " + error.message);
            else { closeEdit(); fetchProducts(); }
            btn.innerText = "Update Item"; btn.disabled = false;
        }

        async function uploadProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const sizes = document.getElementById('p-sizes').value;
            
            if (!name || !price || !selectedFile) return alert("Fill Name, Price and add Photo!");
            const btn = document.getElementById('btn-pub'); btn.disabled = true; btn.innerText = "PUBLISHING...";

            const fName = `${Date.now()}-${selectedFile.name.replace(/\s/g, '_')}`;
            const { error: uErr } = await supabaseClient.storage.from('product-images').upload(fName, selectedFile);
            if (uErr) { alert("Upload Failed!"); btn.disabled = false; return; }

            const { data: { publicUrl } } = supabaseClient.storage.from('product-images').getPublicUrl(fName);
            await supabaseClient.from('products').insert([{ name, price: parseFloat(price), category, sizes, image_url: publicUrl }]);
            location.reload();
        }

        async function deleteProduct(id) { if(confirm("Delete this item?")) { await supabaseClient.from('products').delete().eq('id', id); fetchProducts(); } }

        function renderUI() {
            const query = document.getElementById('admin-search')?.value.toLowerCase() || "";
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));

            document.getElementById('admin-inventory').innerHTML = filtered.map(p => `
                <div class="flex items-center justify-between p-3 border-b last:border-0 border-slate-50 animate-pop">
                    <div class="flex items-center gap-4">
                        <img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover border shadow-sm">
                        <div class="min-w-0">
                            <p class="text-[10px] font-black uppercase truncate w-32">${p.name}</p>
                            <p class="text-[9px] moms-pink font-bold">₹${p.price} | ${p.category || 'No Category'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEdit('${p.id}')" class="bg-slate-50 text-indigo-400 p-2.5 rounded-xl"><i class="fa-solid fa-pencil text-xs"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="bg-slate-50 text-red-300 p-2.5 rounded-xl"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </div>
                </div>`).join('');
            
            document.getElementById('store-grid').innerHTML = products.map(p => `
                <div class="bg-white rounded-[2.5rem] border overflow-hidden relative shadow-sm animate-pop">
                    <img src="${p.image_url}" class="w-full h-40 object-cover">
                    <div class="p-4 text-center">
                        <h3 class="font-black text-[9px] uppercase tracking-tighter mb-1 truncate px-2 text-slate-700">${p.name}</h3>
                        <p class="moms-pink font-black text-xs mb-3 font-serif">₹${p.price}</p>
                        <button class="w-full bg-slate-900 text-white py-2.5 rounded-2xl text-[8px] font-black uppercase tracking-widest active:scale-95 transition-all">Add to bag</button>
                    </div>
                </div>`).join('');
        }

        function switchTab(t) {
            const isAd = t === 'admin';
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById('view-store').classList.add('hidden');

            if (isAd) {
                if (isAdminAuthenticated) document.getElementById('view-admin').classList.remove('hidden');
                else document.getElementById('admin-login').classList.remove('hidden');
            } else {
                document.getElementById('view-store').classList.remove('hidden');
            }
            document.getElementById('tab-admin').className = isAd ? "flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm text-slate-900" : "flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500";
            document.getElementById('tab-store').className = !isAd ? "flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm text-slate-900" : "flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500";
        }

        function handleFile(e) { 
            selectedFile = e.target.files[0]; 
            const reader = new FileReader();
            reader.onload = (f) => { 
                document.getElementById('img-prev').src = f.target.result; 
                document.getElementById('preview-box').classList.remove('hidden'); 
            };
            reader.readAsDataURL(selectedFile);
        }

        function copyLink() { 
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?view=store'); 
            alert("Customer Link Copied!"); 
        }
    </script>
</body>
</html>
